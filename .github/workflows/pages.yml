# GitHub Pages: full analytics dashboard at / and /dashboard/; CNAME targets www (see DEPLOY.md § DNS).
# Optional repo variable VAHAN_API_BASE_URL overrides the default Render URL below.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        env:
          API_BASE: ${{ vars.VAHAN_API_BASE_URL }}
        run: |
          mkdir -p _site/data _site/dashboard _site/legacy
          touch _site/.nojekyll
          cp deploy/github-pages/legacy/README.md _site/legacy/README.md
          if [ -f deploy/github-pages/CNAME ]; then cp deploy/github-pages/CNAME _site/CNAME; fi
          if [ -f docs/data/vahan_master.json ]; then
            cp docs/data/vahan_master.json _site/data/vahan_master.json
          fi
          if [ -f docs/data/india_states.geojson ]; then
            cp docs/data/india_states.geojson _site/data/india_states.geojson
          fi
          cp api/static/robots.txt _site/robots.txt
          cp api/static/sitemap.xml _site/sitemap.xml
          # OG image — prefer the smaller JPEG for LinkedIn crawler reliability;
          # keep the PNG copy too in case any old shares reference it.
          for f in og-image.jpg og-image.png; do
            [ -f api/static/$f ] && cp api/static/$f _site/$f
          done
          # Favicon stack
          for f in favicon.ico favicon.svg apple-touch-icon.png icon-512.png; do
            [ -f api/static/$f ] && cp api/static/$f _site/$f
          done
          # Branded 404 page
          [ -f api/static/404.html ] && cp api/static/404.html _site/404.html
          if [ -f api/static/google5332b27a4f971584.html ]; then
            cp api/static/google5332b27a4f971584.html _site/google5332b27a4f971584.html
          fi
          # Default API = render.yaml service name (override with repo variable VAHAN_API_BASE_URL).
          # Must inject inside <head>, not before DOCTYPE — otherwise browsers may show raw script as text.
          API_EFFECTIVE="${API_BASE:-https://vahan-intelligence-api.onrender.com}"
          API_EFFECTIVE="${API_EFFECTIVE%/}"
          python3 scripts/inject_pages_api_base.py \
            --api-base "$API_EFFECTIVE" \
            --input api/static/dashboard/index.html \
            --output _site/index.html \
            --output _site/dashboard/index.html
          for f in _site/index.html _site/dashboard/index.html; do
            python3 scripts/prerender_dashboard_seo.py --input "$f" --output "$f"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
