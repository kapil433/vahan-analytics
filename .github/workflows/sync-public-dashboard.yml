# Push site to https://github.com/kapil433/ALL-India-Vahan-Analytics-Dashboard
# Secrets on THIS repo:
#   PUBLIC_DASHBOARD_TOKEN — PAT with contents:write on the public repo
#   VAHAN_API_BASE_URL (optional) — e.g. https://your-app.onrender.com (no trailing slash)
name: Sync public dashboard

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "api/static/dashboard/index.html"
      - "api/static/robots.txt"
      - "api/static/sitemap.xml"
      - "api/static/google5332b27a4f971584.html"
      - "deploy/github-pages/**"
      - "docs/data/vahan_master.json"
      - "scripts/inject_pages_api_base.py"
      - "scripts/prerender_dashboard_seo.py"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build publish folder
        env:
          API_BASE: ${{ secrets.VAHAN_API_BASE_URL }}
        run: |
          mkdir -p _public/data _public/dashboard _public/legacy
          touch _public/.nojekyll
          cp deploy/github-pages/index.html _public/welcome.html
          cp deploy/github-pages/legacy/README.md _public/legacy/README.md
          cp api/static/robots.txt _public/robots.txt
          cp api/static/sitemap.xml _public/sitemap.xml
          if [ -f api/static/google5332b27a4f971584.html ]; then
            cp api/static/google5332b27a4f971584.html _public/google5332b27a4f971584.html
          fi
          if [ -f deploy/github-pages/CNAME ]; then cp deploy/github-pages/CNAME _public/CNAME; fi
          API_EFFECTIVE="${API_BASE:-https://vahan-intelligence-api.onrender.com}"
          API_EFFECTIVE="${API_EFFECTIVE%/}"
          python3 scripts/inject_pages_api_base.py \
            --api-base "$API_EFFECTIVE" \
            --input api/static/dashboard/index.html \
            --output _public/dashboard/index.html
          python3 scripts/prerender_dashboard_seo.py \
            --input _public/dashboard/index.html \
            --output _public/dashboard/index.html
          cp _public/dashboard/index.html _public/index.html
          if [ -f docs/data/vahan_master.json ]; then
            cp docs/data/vahan_master.json _public/data/vahan_master.json
          fi

      # peaceiris pushes a directory to another repo without git worktree conflicts (JamesIves + same-branch issue).
      - name: Push to ALL-India-Vahan-Analytics-Dashboard
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_DASHBOARD_TOKEN }}
          external_repository: kapil433/ALL-India-Vahan-Analytics-Dashboard
          publish_branch: main
          publish_dir: ./_public
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "chore: sync site from vahan-analytics"
          force_orphan: false
